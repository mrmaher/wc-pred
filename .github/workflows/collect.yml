name: WC2026 — Collect & Predict

# ── When this runs ────────────────────────────────────────────────────────────
#
#  Hourly from 11am–midnight ET (15:00–04:00 UTC) — covers all match windows.
#  GitHub Actions free tier: 2,000 min/month. 13 runs/day × ~1 min = ~390 min/month.
#  Also triggerable manually via "Run workflow" in the GitHub Actions UI.

on:
  schedule:
    - cron: "0 15-23 * * *"   # 11am–7pm ET (15:00–23:00 UTC)
    - cron: "0 0-4 * * *"     # 8pm–midnight ET (00:00–04:00 UTC next day)
  workflow_dispatch:           # lets you click "Run workflow" from GitHub UI
    inputs:
      sims:
        description: "Monte Carlo iterations (default 10000)"
        required: false
        default: "10000"

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write              # needed to commit the updated DB back to the repo

jobs:
  collect-and-predict:
    name: Collect data & regenerate predictions
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the repo (including data/wc2026.db if it exists)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Pull latest DB before running so we build on current state.
      #    This also prevents non-fast-forward push failures if a local commit
      #    landed between checkout and push.
      - name: Pull latest data
        run: git pull origin main

      # 5. Run data collection + pipeline
      #    ODDS_API_KEY is a GitHub secret — set it in:
      #    Settings → Secrets and variables → Actions → New repository secret
      - name: Run pipeline
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python run_pipeline.py --sims ${{ github.event.inputs.sims || '10000' }}

      # 6. Commit updated DB + Parquet + predictions.json back to the repo
      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: auto-update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          file_pattern: |
            data/wc2026.db
            data/parquet/*.parquet
            data/predictions.json
          push_options: '--force-with-lease'

      # 7. Verify new timestamps were written to the DB
      - name: Verify pipeline output
        run: |
          python3 -c "
import duckdb
conn = duckdb.connect('data/wc2026.db', read_only=True)
row = conn.execute('SELECT MAX(computed_at), COUNT(*) FROM group_sim_results').fetchone()
print(f'group_sim_results: latest={row[0]}  total_rows={row[1]}')
row2 = conn.execute('SELECT MAX(computed_at), COUNT(*) FROM ko_sim_results').fetchone()
print(f'ko_sim_results:    latest={row2[0]}  total_rows={row2[1]}')
row3 = conn.execute('SELECT MAX(collected_at), COUNT(*) FROM elo_snapshots').fetchone()
print(f'elo_snapshots:     latest={row3[0]}  total_rows={row3[1]}')
"

      # 8. Confirm what was written (visible in Actions logs)
      - name: Summary
        run: |
          echo "### Pipeline complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in data/wc2026.db data/predictions.json data/parquet/*.parquet; do
            if [ -f "$f" ]; then
              size=$(du -sh "$f" | cut -f1)
              echo "| \`$f\` | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done
